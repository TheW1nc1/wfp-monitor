name: Build WFP Driver and Controller

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Discover Installed WDK Versions
      shell: powershell
      run: |
        Write-Host "=== Checking installed WDK versions ==="
        $wdkBase = "C:\Program Files (x86)\Windows Kits\10\Include"
        if (Test-Path $wdkBase) {
          Get-ChildItem -Path $wdkBase -Directory | ForEach-Object {
            $ver = $_.Name
            $ntddk = Join-Path $_.FullName "km\ntddk.h"
            if (Test-Path $ntddk) {
              Write-Host "  Found WDK: $ver"
            }
          }
        } else {
          Write-Host "  No WDK found at $wdkBase"
        }

    - name: Configure CMake
      shell: cmd
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build Project
      shell: cmd
      run: cmake --build build --config Release

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: WFP-Compiled-Binaries
        path: |
          build/Release/WfpController.exe
          build/Release/WfpMonitor.sys
