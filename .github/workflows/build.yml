name: Build WFP Driver and Controller

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install WDK 10.0.22621 via winget
      shell: powershell
      run: |
        Write-Host "Installing WDK 10.0.22621.0 via winget..."
        # WDK 22621 package ID from winget
        winget install --id Microsoft.WindowsDriverKit.10.0.22621 `
          --silent --accept-package-agreements --accept-source-agreements
        Write-Host "WDK install exit code: $LASTEXITCODE"
        # Verify installation
        $wdkPath = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km\ntddk.h"
        if (Test-Path $wdkPath) {
          Write-Host "WDK 22621 verified at: $wdkPath"
        } else {
          Write-Error "WDK 22621 NOT found! Build will likely fail."
        }

    - name: Configure CMake
      shell: cmd
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build Project
      shell: cmd
      run: cmake --build build --config Release

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: WFP-Compiled-Binaries
        path: |
          build/Release/WfpController.exe
          build/Release/WfpMonitor.sys
