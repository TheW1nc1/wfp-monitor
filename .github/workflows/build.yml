name: Build WFP Driver and Controller

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install WDK 22621 and Remove WDK 26100
      shell: powershell
      run: |
        Write-Host "=== Step 1: Remove WDK 26100 headers to avoid IF_INDEX conflict ==="
        $wdk26100inc = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0"
        $wdk26100lib = "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.26100.0"
        if (Test-Path $wdk26100inc) {
          Remove-Item -Recurse -Force $wdk26100inc
          Write-Host "Removed WDK 26100 Include dir"
        }
        if (Test-Path $wdk26100lib) {
          Remove-Item -Recurse -Force $wdk26100lib
          Write-Host "Removed WDK 26100 Lib dir"
        }

        Write-Host "=== Step 2: Download WDK 22621 (VS2022 compatible) from Microsoft ==="
        # Official Microsoft link for WDK 10.0.22621.2428 (VS2022)
        # from https://learn.microsoft.com/en-us/windows-hardware/drivers/legacy-wdk-downloads
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2249371"
        Invoke-WebRequest -Uri $wdkUrl -OutFile "wdksetup.exe" -UseBasicParsing
        Write-Host "Downloaded wdksetup.exe, size: $((Get-Item wdksetup.exe).Length) bytes"

        Write-Host "=== Step 3: Install WDK 22621 silently ==="
        $proc = Start-Process -FilePath ".\wdksetup.exe" -ArgumentList "/quiet /norestart" -Wait -PassThru
        Write-Host "WDK installer exited with code: $($proc.ExitCode)"

        Write-Host "=== Step 4: Verify WDK 22621 installation ==="
        $wdkBase = "C:\Program Files (x86)\Windows Kits\10"
        Get-ChildItem "$wdkBase\Include" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
          $ntddk = Join-Path $_.FullName "km\ntddk.h"
          if (Test-Path $ntddk) { Write-Host "  Found WDK: $($_.Name)" }
        }

    - name: Configure CMake
      shell: cmd
      # Force use of SDK version 10.0.22621.0 to match the WDK we just installed
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_SYSTEM_VERSION=10.0.22621.0

    - name: Build Project
      shell: cmd
      run: cmake --build build --config Release

    - name: Generate Genuine Result (Test Sign & Run)
      shell: powershell
      run: |
        echo "[*] Creating Self-Signed Code Signing Certificate"
        $cert = New-SelfSignedCertificate -Subject "CN=WFPTestCI" -Type CodeSigningCert -CertStoreLocation Cert:\LocalMachine\My
        $pwd = ConvertTo-SecureString -String "test" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath cert.pfx -Password $pwd
        
        echo "[*] Trusting the new Root Certificate"
        Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\LocalMachine\Root -Password $pwd
        
        echo "[*] Signing the WFP Kernel Driver"
        & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign /fd SHA256 /a /f cert.pfx /p "test" build\Release\WfpMonitor.sys
        
    - name: Run Final Test (test.exe)
      shell: powershell
      timeout-minutes: 10
      run: |
        echo "[*] CP1: Resolving driver path..."
        $driverPath = (Resolve-Path "build\Release\WfpMonitor.sys").Path
        $sc = "C:\Windows\System32\sc.exe"
        
        echo "[*] CP2: Registering WfpMonitor service..."
        & $sc create WfpMonitor binPath= $driverPath type= kernel start= demand
        
        echo "[*] CP3: Starting WfpMonitor service..."
        & $sc start WfpMonitor
        
        echo "[*] CP4: Setting environment and resolving test.exe..."
        $env:WFP_SKIP_DRIVER_MGMT = "1"
        $testExePath = Resolve-Path "test.exe" | Select-Object -ExpandProperty Path
        
        echo "[*] CP5: Running Controller against test.exe with PSU timeout..."
        # Start Controller as a background process to monitor it properly
        $p = Start-Process -FilePath "build\Release\WfpController.exe" -ArgumentList "`"$testExePath`"" -NoNewWindow -PassThru
        
        # Wait for controller (it has its own 45s timeout, we wait 60s as backup)
        try {
            $p | Wait-Process -Timeout 60 -ErrorAction Stop
        } catch {
            echo "[-] Controller hung or timed out at PowerShell level. Killing..."
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
        }

        echo "[*] CP6: Checking for result.txt..."
        if (Test-Path result.txt) { 
           echo "[*] Capture Success! result.txt content:"
           Get-Content result.txt 
        } else { 
           echo "[-] result.txt not found!" 
        }
        
        echo "[*] CP7: Cleaning up driver..."
        & $sc stop WfpMonitor
        & $sc delete WfpMonitor
        
    - name: Upload Genuine Output Data
      uses: actions/upload-artifact@v4
      with:
        name: Real-Result-TXT
        path: result*.txt

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: WFP-Compiled-Binaries
        path: |
          build/Release/WfpController.exe
          build/Release/WfpMonitor.sys
