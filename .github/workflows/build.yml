name: Build WFP Driver and Controller

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install WDK 22621 via NuGet
      shell: powershell
      run: |
        Write-Host "=== Installing WDK 22621 via NuGet ==="
        nuget install Microsoft.Windows.WDK.x64 -Version 10.0.22621.0 -OutputDirectory C:\wdk22621 -NonInteractive -Verbosity quiet

        $pkg = "C:\wdk22621\Microsoft.Windows.WDK.x64.10.0.22621.0"
        if (-not (Test-Path $pkg)) {
          # Fallback: find any installed version
          $pkg = Get-ChildItem "C:\wdk22621\Microsoft.Windows.WDK*" -Directory | Select-Object -First 1 -ExpandProperty FullName
        }

        Write-Host "Package path: $pkg"
        Write-Host "Package contents:"
        Get-ChildItem $pkg -Recurse -Depth 2 | Select-Object FullName | ForEach-Object { Write-Host "  $($_.FullName)" }

        # Determine include and lib paths inside the package
        $incKm   = Get-ChildItem $pkg -Recurse -Filter "ntddk.h" | Select-Object -First 1 -ExpandProperty DirectoryName
        $libKm   = Get-ChildItem $pkg -Recurse -Filter "ntoskrnl.lib" | Select-Object -First 1 -ExpandProperty DirectoryName
        $incShared = Join-Path (Split-Path $incKm -Parent) "shared"

        Write-Host "Found km includes at: $incKm"
        Write-Host "Found km libs at:     $libKm"

        # Create expected directory structure for FindWDK
        $wdkBase = "C:\Program Files (x86)\Windows Kits\10"
        New-Item -ItemType Directory -Force "$wdkBase\Include\10.0.22621.0\km"     | Out-Null
        New-Item -ItemType Directory -Force "$wdkBase\Include\10.0.22621.0\shared" | Out-Null
        New-Item -ItemType Directory -Force "$wdkBase\Lib\10.0.22621.0\km\x64"    | Out-Null

        # Copy all headers
        Copy-Item "$incKm\*" "$wdkBase\Include\10.0.22621.0\km\" -Recurse -Force
        if (Test-Path $incShared) {
          Copy-Item "$incShared\*" "$wdkBase\Include\10.0.22621.0\shared\" -Recurse -Force
        }
        # Copy kernel lib files
        Copy-Item "$libKm\*" "$wdkBase\Lib\10.0.22621.0\km\x64\" -Recurse -Force

        Write-Host "WDK 22621 setup complete!"
        $ntddk = "$wdkBase\Include\10.0.22621.0\km\ntddk.h"
        Write-Host "ntddk.h exists: $(Test-Path $ntddk)"

    - name: Configure CMake
      shell: cmd
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build Project
      shell: cmd
      run: cmake --build build --config Release

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: WFP-Compiled-Binaries
        path: |
          build/Release/WfpController.exe
          build/Release/WfpMonitor.sys
